interface:
  display_name: "奶龙化设计过滤器"
  short_description: "最终设计过滤器：系统改写前端结构、组件、图像、纹理与动效"
  default_prompt: "Use $nailongize-designs as the final pass at C4-S4-R2-P5-M2. Before designing, read the persistent Nailong reference board and character-topology contract. Use real character assets or generated assets grounded in that reference; never build the character from CSS ellipses or generic yellow blocks. When R changes, independently re-solve the whole composition—quantity, scale, pose, placement, overlap, and negative space—while preserving functionality, accessibility, content, and responsive behavior."
